# Backend RED alerts — PromQL aligned with diaai-backend-red dashboard
apiVersion: 1

groups:
  - orgId: 1
    name: diaai-backend
    folder: diaai
    interval: 1m
    rules:
      - uid: diaai_backend_5xx_rate
        title: Backend 5xx rate > 5%
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: |
                100 * sum(rate(http_requests_total{job="diaai-backend",status="5xx"}[5m]))
                / clamp_min(sum(rate(http_requests_total{job="diaai-backend"}[5m])), 1e-9)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              expression: A
              reducer: last
              settings:
                mode: dropNN
              type: reduce
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 5
                    type: gt
                  operator:
                    type: and
                  reducer:
                    params: []
                    type: last
              expression: B
              type: threshold
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: Backend HTTP 5xx rate above 5%
          description: |
            5xx rate is {{ printf "%.2f" $values.B }}% (threshold 5%) over 5m window.
            Dashboard: diaai Backend RED · Loki: {service="backend"} |= "500 Internal Server Error"
        dashboardUid: diaai-backend-red
        panelId: 2

      - uid: diaai_backend_p95_latency
        title: Backend p95 latency > 2s
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: |
                histogram_quantile(
                  0.95,
                  sum(rate(http_request_duration_seconds_bucket{job="diaai-backend"}[5m])) by (le)
                )
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              expression: A
              reducer: last
              settings:
                mode: dropNN
              type: reduce
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
          - refId: C
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 2
                    type: gt
                  operator:
                    type: and
                  reducer:
                    params: []
                    type: last
              expression: B
              type: threshold
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
        noDataState: OK
        execErrState: Error
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: Backend p95 latency above 2s
          description: |
            p95 latency is {{ printf "%.2f" $values.B }}s (threshold 2s).
            Dashboard: diaai Backend RED · check slow handlers and DB/LLM.
        dashboardUid: diaai-backend-red
        panelId: 3
