# GlitchTip production stack (Sentry-compatible ingest)
# Docs: https://glitchtip.com/documentation/install
# Deploy: devops/glitchtip/timeweb-deploy.md

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip -d glitchtip"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: glitchtip/glitchtip:v6.0.10
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    command: ./manage.py migrate && ./manage.py createcachetable && ./manage.py maintain_partitions
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}

  web:
    image: glitchtip/glitchtip:v6.0.10
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - glitchtip_uploads:/code/uploads
    healthcheck:
      test: ["CMD-SHELL", "python3 /code/healthcheck.py || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  worker:
    image: glitchtip/glitchtip:v6.0.10
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ./bin/run-celery.sh
    env_file:
      - .env
    volumes:
      - glitchtip_uploads:/code/uploads

volumes:
  glitchtip_pg_data:
  glitchtip_uploads:
