# Server compose override — bind postgres to localhost only.
# Copy on VPS:
#   cp devops/deploy/compose.server.override.yml compose.override.yml
#
# docker compose auto-merges compose.override.yml

services:
  postgres:
    # Replace base "5433:5432" — avoid double bind (compose merges arrays by default)
    ports: !override
      - "127.0.0.1:5433:5432"

  # Host network: Timeweb blocks SMTP from Docker bridge; Mail.ru reachable via IPv6 on host.
  backend:
    network_mode: host
    environment:
      DATABASE_URL: postgresql+asyncpg://diaai:diaai@127.0.0.1:5433/diaai
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000

  web:
    environment:
      BACKEND_URL: http://172.18.0.1:8000

  bot:
    environment:
      BACKEND_URL: http://172.18.0.1:8000
