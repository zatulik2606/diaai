# diaai — local full stack
# Single compose file: postgres + backend + web (+ bot profile).
# Profiles: build (local build, default via Makefile) | registry (GHCR pull)
# Host dev: make db-up / backend-run / web-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: diaai
      POSTGRES_PASSWORD: diaai
      POSTGRES_DB: diaai
    ports:
      - "5433:5432"
    volumes:
      - diaai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diaai -d diaai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    profiles:
      - build
      - registry
    image: ${DIAAI_BACKEND_IMAGE:-diaai-backend:local}
    build:
      context: .
      dockerfile: devops/docker/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://diaai:diaai@postgres:5432/diaai
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  web:
    profiles:
      - build
      - registry
    image: ${DIAAI_WEB_IMAGE:-diaai-web:local}
    build:
      context: web
      dockerfile: ../devops/docker/web/Dockerfile
      args:
        NEXT_PUBLIC_GLITCHTIP_DSN: ${NEXT_PUBLIC_GLITCHTIP_DSN:-}
        GLITCHTIP_DSN: ${GLITCHTIP_WEB_DSN:-}
        GLITCHTIP_URL: ${GLITCHTIP_URL:-}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8000
      GLITCHTIP_DSN: ${GLITCHTIP_WEB_DSN:-}
      NEXT_PUBLIC_GLITCHTIP_DSN: ${NEXT_PUBLIC_GLITCHTIP_DSN:-}
      GLITCHTIP_URL: ${GLITCHTIP_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 40s
      retries: 5
    restart: unless-stopped

  bot:
    profiles:
      - bot
    image: ${DIAAI_BOT_IMAGE:-diaai-bot:local}
    build:
      context: .
      dockerfile: devops/docker/bot/Dockerfile
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  diaai_pg_data:
