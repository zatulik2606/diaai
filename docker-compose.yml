# PostgreSQL for local backend dev.
# Host port 5433 avoids conflict with a local Postgres on 5432.
# Backend runs separately: make backend-run (not in this compose file).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: diaai
      POSTGRES_PASSWORD: diaai
      POSTGRES_DB: diaai
    ports:
      - "5433:5432"
    volumes:
      - diaai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diaai -d diaai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  diaai_pg_data:
